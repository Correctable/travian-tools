<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Statistics — Travian Tools</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --navy:#0f2153;--navy2:#1a3068;--blue:#1d4ed8;--blue2:#2563eb;
  --blue-light:#3b82f6;--blue-glow:rgba(59,130,246,0.10);
  --surface:#ffffff;--surface2:#f8faff;--border:#e2e8f3;
  --border2:rgba(37,99,235,0.25);--text:#0f2153;--text2:#3d5a8a;--text3:#7a93bc;
  --green:#059669;--green-bg:rgba(5,150,105,0.08);
  --amber:#d97706;--amber-bg:rgba(217,119,6,0.08);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;color:var(--text);background:var(--surface);min-height:100vh;}
.bg-dot{position:fixed;inset:0;z-index:0;pointer-events:none;background-image:radial-gradient(circle,rgba(37,99,235,0.07) 1px,transparent 1px);background-size:32px 32px;}
.bg-glow{position:fixed;top:-200px;left:50%;transform:translateX(-50%);width:900px;height:600px;z-index:0;pointer-events:none;background:radial-gradient(ellipse at center,rgba(37,99,235,0.06) 0%,transparent 70%);}

/* Navbar di-handle oleh navbar.js */


.btn-ghost{font-family:'DM Sans',sans-serif;font-size:0.875rem;font-weight:500;color:var(--text2);border:1px solid var(--border);background:transparent;padding:7px 16px;border-radius:8px;cursor:pointer;transition:all 0.18s;text-decoration:none;display:inline-flex;align-items:center;}
.btn-ghost:hover{border-color:var(--border2);color:var(--navy);background:var(--surface2);}
.btn-primary{font-family:'DM Sans',sans-serif;font-size:0.875rem;font-weight:600;color:#fff;background:var(--blue2);border:none;padding:7px 16px;border-radius:8px;cursor:pointer;transition:all 0.18s;text-decoration:none;display:inline-flex;align-items:center;gap:6px;box-shadow:0 2px 8px rgba(37,99,235,0.25);}
.btn-primary:hover{background:var(--blue);box-shadow:0 4px 16px rgba(37,99,235,0.35);}

.page-wrap{position:relative;z-index:1;max-width:860px;margin:0 auto;padding:64px 24px 80px;}
.page-header{text-align:center;margin-bottom:48px;animation:fadeDown 0.4s ease both;}
.page-header h1{font-family:'Space Grotesk',sans-serif;font-size:2rem;font-weight:700;letter-spacing:-0.02em;color:var(--navy);}
.page-header p{color:var(--text2);margin-top:8px;font-size:0.975rem;}

.servers-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px;}
.server-card{
  background:white;border:1.5px solid var(--border);border-radius:16px;
  padding:24px;cursor:pointer;text-decoration:none;color:inherit;
  transition:all 0.2s;display:block;
  animation:fadeUp 0.4s ease both;
}
.server-card:hover{border-color:var(--border2);transform:translateY(-3px);box-shadow:0 12px 40px rgba(15,33,83,0.10);}
.server-card:hover .sc-arrow{opacity:1;transform:translateX(0);}
.sc-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px;}
.sc-icon{width:44px;height:44px;background:var(--blue-glow);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.25rem;}
.sc-status{display:flex;align-items:center;gap:5px;font-size:0.72rem;font-weight:700;color:var(--green);}
.sc-status::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s ease-in-out infinite;}
.sc-name{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:1rem;color:var(--navy);margin-bottom:4px;}
.sc-full{font-size:0.775rem;color:var(--text3);margin-bottom:16px;}
.sc-stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px;}
.sc-stat{background:var(--surface2);border-radius:8px;padding:10px 12px;}
.sc-stat .sl{font-size:0.68rem;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.04em;}
.sc-stat .sv{font-family:'Space Grotesk',sans-serif;font-size:1rem;font-weight:700;color:var(--navy);margin-top:2px;}
.sc-footer{display:flex;align-items:center;justify-content:space-between;}
.sc-updated{font-size:0.72rem;color:var(--text3);}
.sc-arrow{font-size:0.875rem;color:var(--blue2);font-weight:700;opacity:0;transform:translateX(-6px);transition:all 0.2s;}

.add-server{
  background:var(--surface2);border:1.5px dashed var(--border);border-radius:16px;
  padding:24px;display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:8px;color:var(--text3);
  min-height:160px;font-size:0.875rem;
  animation:fadeUp 0.4s 0.1s ease both;
}
.add-server svg{opacity:0.4;}

@keyframes fadeDown{from{opacity:0;transform:translateY(-14px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
</style>
</head>
<body>
<div class="bg-dot"></div>
<div class="bg-glow"></div>

<!-- NAVBAR -->
<div id="navbar-root"></div>

<div class="page-wrap">
  <div class="page-header">
    <h1>📊 Server Statistics</h1>
    <p>Choose a server to view player rankings, alliance stats, and growth history.</p>
  </div>

  <div class="servers-grid" id="serversGrid">
    <!-- Diisi JS -->
  </div>
</div>

<script>
const TURSO_URL   = 'https://travian-stats-correctable.turso.io';
const TURSO_TOKEN = 'eyJhbGciOiJFZERTQSIsInR5cCI6IkpXVCJ9.eyJhIjoicm8iLCJpYXQiOjE3Nzk2MDM3ODcsImlkIjoiMDE5ZTU4MmMtNWEwMS03YWIxLTg3NTgtNWNmYzllOWMyY2U3IiwicmlkIjoiMzNmMzgyNDItMTU3Yy00N2FjLWFkMzQtNDFhZDRhZDFhNjhhIn0.jXrskYytK1bpe7YkS0GigPktGeoRPZR7L-1Vto8-wWgBeKC5FthmH6wUgVzKuLy-9xEKDZY117xBfHqgIi2eAw';

// Daftar server yang tersedia — tambah di sini kalau ada server baru
const SERVERS = [
  { code: 'ts5', slug: 'ts5.x1.asia', full: 'ts5.x1.asia.travian.com', label: 'Asia 5', flag: '🌏' },
];

async function query(sql, args = []) {
  const res = await fetch(`${TURSO_URL}/v2/pipeline`, {
    method: 'POST',
    headers: { 'Authorization': `Bearer ${TURSO_TOKEN}`, 'Content-Type': 'application/json' },
    body: JSON.stringify({
      requests: [
        { type: 'execute', stmt: { sql, args: args.map(v =>
            v === null ? {type:'null',value:null}
          : typeof v === 'number' ? {type:'integer',value:String(v)}
          : {type:'text',value:String(v)}) }},
        { type: 'close' }
      ]
    })
  });
  const data = await res.json();
  const result = data.results?.[0]?.response?.result;
  if (!result) return [];
  const cols = result.cols.map(c => c.name);
  return result.rows.map(row => { const o={}; row.forEach((c,i)=>o[cols[i]]=c.value); return o; });
}

function fmtNum(n) { return n ? Number(n).toLocaleString() : '—'; }

async function loadServers() {
  const grid = document.getElementById('serversGrid');
  for (let i = 0; i < SERVERS.length; i++) {
    const s = SERVERS[i];
    const snap = await query(
      'SELECT * FROM snapshots WHERE server = ? ORDER BY snap_date DESC LIMIT 1',
      [s.code]
    );
    const d = snap[0] || {};
    const card = document.createElement('a');
    card.href  = `/statistics/${s.slug}/`;
    card.className = 'server-card';
    card.style.animationDelay = `${i * 0.08}s`;
    card.innerHTML = `
      <div class="sc-top">
        <div class="sc-icon">${s.flag}</div>
        <div class="sc-status">LIVE</div>
      </div>
      <div class="sc-name">${s.label}</div>
      <div class="sc-full">${s.full}</div>
      <div class="sc-stats">
        <div class="sc-stat"><div class="sl">Players</div><div class="sv">${fmtNum(d.total_players)}</div></div>
        <div class="sc-stat"><div class="sl">Villages</div><div class="sv">${fmtNum(d.total_villages)}</div></div>
        <div class="sc-stat"><div class="sl">Alliances</div><div class="sv">${fmtNum(d.total_alliances)}</div></div>
        <div class="sc-stat"><div class="sl">Population</div><div class="sv">${fmtNum(d.total_population)}</div></div>
      </div>
      <div class="sc-footer">
        <span class="sc-updated">Updated: ${d.snap_date || '—'}</span>
        <span class="sc-arrow">View →</span>
      </div>`;
    grid.appendChild(card);
  }

  // Tombol "Coming soon"
  const add = document.createElement('div');
  add.className = 'add-server';
  add.innerHTML = `<svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 8v8M8 12h8"/></svg><span>More servers coming soon</span>`;
  grid.appendChild(add);
}

loadServers();
</script>
<script src="/navbar.js"></script>

</body>
</html>
