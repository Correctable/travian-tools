name: Import Static Data (Oases & Village Tiles)

on:
  # Hanya manual — dijalankan sekali saat server baru dibuka
  workflow_dispatch:
    inputs:
      server:
        description: "Server target"
        required: true
        default: "ts5"
        type: choice
        options:
          - ts5
          - ttq_asia
          - ttq_america
          - ttq_europe
          - ttq_arabics
      oases_url:
        description: "URL raw GitHub oases.json (kosongkan kalau skip)"
        required: false
        default: ""
      villages_url:
        description: "URL raw GitHub villages.json (kosongkan kalau skip)"
        required: false
        default: ""

jobs:
  import:
    name: Import Oases & Village Tiles (${{ inputs.server }})
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ── Resolve secrets berdasarkan server yang dipilih ──────────────────────
      - name: Set DB credentials
        id: creds
        run: |
          case "${{ inputs.server }}" in
            ts5)
              echo "db_url=${{ secrets.TURSO_DATABASE_URL }}"          >> $GITHUB_OUTPUT
              echo "db_token=${{ secrets.TURSO_AUTH_TOKEN }}"           >> $GITHUB_OUTPUT
              ;;
            ttq_asia)
              echo "db_url=${{ secrets.TURSO_DATABASE_URL_TTQ_ASIA }}"  >> $GITHUB_OUTPUT
              echo "db_token=${{ secrets.TURSO_AUTH_TOKEN_TTQ_ASIA }}"  >> $GITHUB_OUTPUT
              ;;
            ttq_america)
              echo "db_url=${{ secrets.TURSO_DATABASE_URL_TTQ_AM }}"    >> $GITHUB_OUTPUT
              echo "db_token=${{ secrets.TURSO_AUTH_TOKEN_TTQ_AM }}"    >> $GITHUB_OUTPUT
              ;;
            ttq_europe)
              echo "db_url=${{ secrets.TURSO_DATABASE_URL_TTQ_EU }}"    >> $GITHUB_OUTPUT
              echo "db_token=${{ secrets.TURSO_AUTH_TOKEN_TTQ_EU }}"    >> $GITHUB_OUTPUT
              ;;
            ttq_arabics)
              echo "db_url=${{ secrets.TURSO_DATABASE_URL_TTQ_AR }}"    >> $GITHUB_OUTPUT
              echo "db_token=${{ secrets.TURSO_AUTH_TOKEN_TTQ_AR }}"    >> $GITHUB_OUTPUT
              ;;
            *)
              echo "❌ Unknown server: ${{ inputs.server }}"
              exit 1
              ;;
          esac

      - name: Import Oases
        if: ${{ inputs.oases_url != '' }}
        env:
          TURSO_DATABASE_URL: ${{ steps.creds.outputs.db_url }}
          TURSO_AUTH_TOKEN:   ${{ steps.creds.outputs.db_token }}
          SERVER_CODE:        ${{ inputs.server }}
        run: |
          python scripts/import_oases.py "${{ inputs.oases_url }}"

      - name: Import Village Tiles
        if: ${{ inputs.villages_url != '' }}
        env:
          TURSO_DATABASE_URL: ${{ steps.creds.outputs.db_url }}
          TURSO_AUTH_TOKEN:   ${{ steps.creds.outputs.db_token }}
          SERVER_CODE:        ${{ inputs.server }}
        run: |
          python scripts/import_village_tiles.py "${{ inputs.villages_url }}"

      - name: Done
        if: success()
        run: echo "✅ Import ${{ inputs.server }} selesai!"

      - name: Failed
        if: failure()
        run: echo "❌ Import ${{ inputs.server }} gagal — cek log di atas"
