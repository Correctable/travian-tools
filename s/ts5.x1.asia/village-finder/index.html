<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Village Finder — Travian Tools</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --navy:#0f2153;--navy2:#1a3068;--blue:#1d4ed8;--blue2:#2563eb;
  --blue-light:#3b82f6;--blue-glow:rgba(59,130,246,0.10);
  --surface:#ffffff;--surface2:#f8faff;--border:#e2e8f3;
  --border2:rgba(37,99,235,0.25);--text:#0f2153;--text2:#3d5a8a;--text3:#7a93bc;
  --green:#059669;--green-bg:rgba(5,150,105,0.08);--green-light:#d1fae5;
  --amber:#d97706;--amber-bg:rgba(217,119,6,0.08);
  --red:#dc2626;--red-bg:rgba(220,38,38,0.08);
  --purple:#7c3aed;--purple-bg:rgba(124,58,237,0.08);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;color:var(--text);background:var(--surface);min-height:100vh;}
.bg-dot{position:fixed;inset:0;z-index:0;pointer-events:none;background-image:radial-gradient(circle,rgba(37,99,235,0.055) 1px,transparent 1px);background-size:32px 32px;}
.bg-glow{position:fixed;top:-200px;left:50%;transform:translateX(-50%);width:800px;height:500px;z-index:0;pointer-events:none;background:radial-gradient(ellipse at center,rgba(59,130,246,0.07) 0%,transparent 70%);}


main{position:relative;z-index:1;max-width:1100px;margin:0 auto;padding:36px 24px 80px;}

.page-header{margin-bottom:28px;animation:fadeDown 0.35s ease both;}
.page-header-top{display:flex;align-items:center;gap:10px;margin-bottom:6px;}
.page-icon{width:38px;height:38px;border-radius:10px;background:var(--green-bg);display:flex;align-items:center;justify-content:center;font-size:18px;}
.badge-free{background:var(--green-bg);color:var(--green);font-size:0.6rem;font-weight:700;border-radius:100px;padding:3px 8px;letter-spacing:0.04em;}
.page-header h1{font-family:'Space Grotesk',sans-serif;font-size:1.65rem;font-weight:700;color:var(--navy);letter-spacing:-0.02em;}
.page-header p{color:var(--text2);font-size:0.9rem;line-height:1.6;}

/* ── Filter panel ── */
.filter-panel{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px 24px;margin-bottom:24px;animation:fadeUp 0.35s ease 0.05s both;}
.filter-row{display:flex;flex-wrap:wrap;gap:14px;align-items:flex-end;}
.fg{display:flex;flex-direction:column;gap:5px;}
.fg label{font-size:0.7rem;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.06em;}
.fg select,.fg input[type=number],.fg input[type=text]{font-family:'DM Sans',sans-serif;font-size:0.875rem;color:var(--text);background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:8px 11px;outline:none;transition:border-color 0.18s;}
.fg select:focus,.fg input:focus{border-color:var(--blue-light);}
.fg input[type=number]{width:80px;}
.fg .xy-wrap{display:flex;gap:6px;align-items:center;}
.fg .xy-wrap span{font-size:0.8rem;color:var(--text3);}
.fg input.coord{width:72px;}

/* crop checkboxes */
.crop-checks{display:flex;gap:6px;flex-wrap:wrap;}
.crop-check{display:none;}
.crop-label{display:inline-flex;align-items:center;gap:5px;padding:6px 11px;border:1px solid var(--border);border-radius:7px;cursor:pointer;font-size:0.8rem;font-weight:600;color:var(--text2);transition:all 0.15s;background:var(--surface);user-select:none;}
.crop-label:hover{border-color:var(--green);color:var(--green);}
.crop-check:checked + .crop-label{background:var(--green-bg);border-color:var(--green);color:var(--green);}

/* oasis type checkboxes */
.oasis-checks{display:flex;gap:6px;flex-wrap:wrap;}
.oasis-check{display:none;}
.oasis-label{display:inline-flex;align-items:center;gap:5px;padding:6px 11px;border:1px solid var(--border);border-radius:7px;cursor:pointer;font-size:0.8rem;font-weight:600;color:var(--text2);transition:all 0.15s;background:var(--surface);user-select:none;}
.oasis-label:hover{border-color:var(--amber);color:var(--amber);}
.oasis-check:checked + .oasis-label{background:var(--amber-bg);border-color:var(--amber);color:var(--amber);}

/* status radio */
.status-radios{display:flex;gap:6px;flex-wrap:wrap;}
.status-radio{display:none;}
.status-label{display:inline-flex;align-items:center;gap:5px;padding:6px 11px;border:1px solid var(--border);border-radius:7px;cursor:pointer;font-size:0.8rem;font-weight:600;color:var(--text2);transition:all 0.15s;background:var(--surface);user-select:none;}
.status-radio:checked + .status-label{background:var(--blue-glow);border-color:var(--blue-light);color:var(--blue2);}

.filter-divider{width:100%;height:1px;background:var(--border);margin:14px 0;}

.btn-search{font-family:'DM Sans',sans-serif;font-size:0.875rem;font-weight:600;background:var(--blue2);color:#fff;border:none;border-radius:8px;padding:9px 22px;cursor:pointer;transition:background 0.18s,transform 0.1s;white-space:nowrap;align-self:flex-end;}
.btn-search:hover{background:var(--blue);}
.btn-search:active{transform:scale(0.98);}
.btn-search:disabled{background:var(--text3);cursor:not-allowed;}

/* ── Stats bar ── */
.stats-bar{display:flex;gap:20px;margin-bottom:16px;flex-wrap:wrap;animation:fadeIn 0.4s ease 0.15s both;}
.stat-item .stat-label{font-size:0.72rem;color:var(--text3);}
.stat-item .stat-value{font-family:'Space Grotesk',sans-serif;font-size:1.05rem;font-weight:700;color:var(--navy);}

/* ── Table ── */
.table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;animation:fadeUp 0.4s ease 0.1s both;}

table{width:100%;border-collapse:collapse;font-size:0.845rem;}
thead th{padding:10px 14px;background:var(--surface2);border-bottom:1px solid var(--border);font-size:0.68rem;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.07em;text-align:left;white-space:nowrap;cursor:pointer;user-select:none;}
thead th:hover{color:var(--text2);}
thead th.sorted{color:var(--blue2);}
thead th .arr{margin-left:3px;opacity:0.5;}
thead th.sorted .arr{opacity:1;}

tbody tr{border-bottom:1px solid var(--border);transition:background 0.12s;}
tbody tr:last-child{border-bottom:none;}
tbody tr:hover{background:var(--surface2);}
td{padding:10px 14px;vertical-align:middle;}

/* coord link */
.coord-link{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:0.875rem;color:var(--blue2);text-decoration:none;white-space:nowrap;}
.coord-link:hover{text-decoration:underline;}

/* land badge */
.land-badge{display:inline-flex;align-items:center;gap:5px;}
.crop-pill{font-family:'Space Grotesk',sans-serif;font-size:0.7rem;font-weight:700;padding:2px 7px;border-radius:5px;background:var(--green-bg);color:var(--green);}
.crop-pill.c15{background:#d1fae5;color:#065f46;}
.crop-pill.c9{background:var(--green-bg);color:var(--green);}
.crop-pill.c7{background:var(--amber-bg);color:var(--amber);}
.crop-pill.c6{background:rgba(220,38,38,0.07);color:var(--red);}

/* status dot */
.status-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.status-dot.free{background:var(--green);}
.status-dot.occupied{background:var(--red);}
.status-text{font-size:0.75rem;}
.status-text.free{color:var(--green);}
.status-text.occupied{color:var(--red);}

/* oasis count bubbles */
.oasis-bubbles{display:flex;gap:4px;align-items:center;flex-wrap:wrap;}
.ob{font-size:0.68rem;font-weight:700;padding:2px 6px;border-radius:5px;white-space:nowrap;}
.ob-crop{background:#d1fae5;color:#065f46;}
.ob-wood{background:#fef3c7;color:#92400e;}
.ob-clay{background:#fee2e2;color:#991b1b;}
.ob-iron{background:#ede9fe;color:#5b21b6;}
.ob-total{background:var(--blue-glow);color:var(--blue2);font-size:0.75rem;font-weight:700;}

.dist-val{font-family:'Space Grotesk',sans-serif;font-size:0.8rem;color:var(--text2);}
.pop-val{font-family:'Space Grotesk',sans-serif;font-size:0.85rem;font-weight:600;color:var(--navy);}
.player-name{font-weight:600;color:var(--navy);font-size:0.85rem;}
.alliance-tag{display:inline-block;background:var(--blue-glow);color:var(--blue2);font-size:0.68rem;font-weight:700;padding:1px 6px;border-radius:4px;}
.no-data{color:var(--text3);font-size:0.8rem;}

/* State box */
.state-box{padding:56px 24px;text-align:center;}
.state-box .si{font-size:2.2rem;margin-bottom:10px;}
.state-box h3{font-family:'Space Grotesk',sans-serif;font-weight:600;color:var(--navy);margin-bottom:5px;}
.state-box p{color:var(--text2);font-size:0.875rem;line-height:1.65;}

.spinner{display:inline-block;width:14px;height:14px;border:2px solid var(--border);border-top-color:var(--blue2);border-radius:50%;animation:spin 0.7s linear infinite;vertical-align:middle;margin-right:6px;}

/* pagination */
.pager{display:flex;align-items:center;justify-content:center;gap:6px;padding:14px;border-top:1px solid var(--border);flex-wrap:wrap;}
.pg-btn{font-family:'DM Sans',sans-serif;font-size:0.78rem;font-weight:500;background:white;border:1px solid var(--border);color:var(--text2);width:30px;height:30px;border-radius:6px;cursor:pointer;transition:all 0.15s;display:inline-flex;align-items:center;justify-content:center;}
.pg-btn:hover:not(:disabled){background:var(--surface2);border-color:var(--border2);}
.pg-btn.active{background:var(--blue2);border-color:var(--blue2);color:white;}
.pg-btn:disabled{opacity:0.35;cursor:not-allowed;}

.info-note{margin-top:14px;padding:11px 15px;background:var(--blue-glow);border:1px solid rgba(37,99,235,0.12);border-radius:10px;font-size:0.8rem;color:var(--text2);line-height:1.6;}

/* Field type — step 1: count buttons */
.ft-counts{display:flex;gap:6px;flex-wrap:wrap;}
.ft-count-btn{font-family:'Space Grotesk',sans-serif;font-size:0.85rem;font-weight:700;padding:7px 16px;border:1.5px solid var(--border);border-radius:8px;cursor:pointer;background:var(--surface);color:var(--text2);transition:all 0.15s;}
.ft-count-btn:hover{border-color:var(--blue-light);color:var(--navy);}
.ft-count-btn.active.c18{background:var(--purple-bg);border-color:var(--purple);color:var(--purple);}
.ft-count-btn.active.c15{background:#d1fae5;border-color:#059669;color:#065f46;}
.ft-count-btn.active.c9{background:var(--green-bg);border-color:var(--green);color:var(--green);}
.ft-count-btn.active.c7{background:var(--amber-bg);border-color:var(--amber);color:var(--amber);}
.ft-count-btn.active.c6{background:var(--red-bg);border-color:var(--red);color:var(--red);}
/* Step 2: variant picker */
.ft-variants{margin-top:12px;display:flex;flex-direction:column;gap:10px;}
.ft-variant-group{display:flex;flex-wrap:wrap;gap:6px;align-items:center;}
.ft-variant-label{font-size:0.68rem;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.06em;width:100%;margin-bottom:2px;}
.ft-check{display:none;}
.ft-label{display:inline-flex;flex-direction:column;align-items:center;gap:2px;padding:6px 10px;border:1px solid var(--border);border-radius:8px;cursor:pointer;transition:all 0.15s;background:var(--surface);user-select:none;min-width:64px;}
.ft-label:hover{border-color:var(--blue-light);}
.ft-crop{font-family:'Space Grotesk',sans-serif;font-size:0.8rem;font-weight:700;}
.ft-dist{font-size:0.65rem;color:var(--text3);font-family:'Space Grotesk',sans-serif;}
/* color variants */
.ft-label.c18{border-color:rgba(124,58,237,0.3);}
.ft-label.c18 .ft-crop{color:var(--purple);}
.ft-label.c15{border-color:rgba(5,150,105,0.3);}
.ft-label.c15 .ft-crop{color:#065f46;}
.ft-label.c9{border-color:rgba(5,150,105,0.25);}
.ft-label.c9 .ft-crop{color:var(--green);}
.ft-label.c7{border-color:rgba(217,119,6,0.25);}
.ft-label.c7 .ft-crop{color:var(--amber);}
.ft-label.c6{border-color:rgba(220,38,38,0.2);}
.ft-label.c6 .ft-crop{color:var(--red);}
/* checked states */
.ft-check:checked + .ft-label.c18{background:var(--purple-bg);border-color:var(--purple);}
.ft-check:checked + .ft-label.c15{background:#d1fae5;border-color:#059669;}
.ft-check:checked + .ft-label.c9{background:var(--green-bg);border-color:var(--green);}
.ft-check:checked + .ft-label.c7{background:var(--amber-bg);border-color:var(--amber);}
.ft-check:checked + .ft-label.c6{background:var(--red-bg);border-color:var(--red);}
.ft-check:checked + .ft-label .ft-dist{color:inherit;opacity:0.7;}

/* quick buttons */
.btn-quick{font-family:'DM Sans',sans-serif;font-size:0.75rem;font-weight:500;background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:4px 10px;cursor:pointer;color:var(--text2);transition:all 0.15s;}
.btn-quick:hover{background:var(--surface2);border-color:var(--border2);color:var(--navy);}

/* Oasis icon bubbles */
.oasis-icons-row{display:flex;flex-wrap:wrap;gap:6px;align-items:center;}
.icon-bubble{display:inline-flex;align-items:center;gap:3px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:3px 7px;}
.oasis-icon{width:20px;height:20px;object-fit:contain;display:block;}
.icon-count{font-family:'Space Grotesk',sans-serif;font-size:0.72rem;font-weight:700;color:var(--text2);}

/* Player / alliance links */
.player-link{font-weight:600;color:var(--navy);text-decoration:none;font-size:0.85rem;}
.player-link:hover{color:var(--blue2);text-decoration:underline;}
.alliance-link{text-decoration:none;}
.alliance-link:hover .alliance-tag{background:var(--blue2);color:#fff;}

@keyframes fadeDown{from{opacity:0;transform:translateY(-14px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}

@media(max-width:700px){
  nav{padding:0 16px;}
  main{padding:20px 14px 60px;}
  .filter-row{flex-direction:column;}
  .hide-m{display:none;}
}
</style>
</head>
<body>
<div class="bg-dot"></div>
<div class="bg-glow"></div>

<div id="navbar-root"></div>

<main>
  <div class="page-header">
    <div class="page-header-top">
      <div class="page-icon">🌾</div>
      <span class="badge-free">FREE</span>
    </div>
    <h1>Village Finder</h1>
    <p>Cari desa berdasarkan crop field, status kosong/terisi, dan jumlah oasis dalam 5×5.</p>
  </div>

  <!-- Filter Panel -->
  <div class="filter-panel">

    <!-- Row 1: Server + XY + Status -->
    <div class="filter-row" style="margin-bottom:14px">
      <div class="fg">
        <label>Server</label>
        <select id="serverSel">
          <option value="ts5" data-tiles="ts5.x1.asia.travian.com">ts5.x1.asia</option>
        </select>
      </div>
      <div class="fg">
        <label>Center X, Y</label>
        <div class="xy-wrap">
          <input type="number" class="coord" id="cx" value="0" placeholder="X">
          <span>|</span>
          <input type="number" class="coord" id="cy" value="0" placeholder="Y">
        </div>
      </div>
      <div class="fg">
        <label>Status Tile</label>
        <div class="status-radios">
          <input type="radio" class="status-radio" name="status" id="sAll" value="all" checked>
          <label class="status-label" for="sAll">All</label>
          <input type="radio" class="status-radio" name="status" id="sFree" value="free">
          <label class="status-label" for="sFree">Free</label>
          <input type="radio" class="status-radio" name="status" id="sOcc" value="occupied">
          <label class="status-label" for="sOcc">Occupied</label>
        </div>
      </div>
    </div>

    <div class="filter-divider"></div>

    <!-- Row 2: Field type selector -->
    <div style="margin-bottom:14px">
      <div class="fg" style="width:100%">
        <label>Field Type</label>
        <!-- Step 1: pick crop count -->
        <div class="ft-counts" id="ftCounts">
          <button class="ft-count-btn" data-crop="18" onclick="toggleCropCount(this)">18c</button>
          <button class="ft-count-btn" data-crop="15" onclick="toggleCropCount(this)">15c</button>
          <button class="ft-count-btn" data-crop="9"  onclick="toggleCropCount(this)">9c</button>
          <button class="ft-count-btn" data-crop="7"  onclick="toggleCropCount(this)">7c</button>
          <button class="ft-count-btn" data-crop="6"  onclick="toggleCropCount(this)">6c</button>
        </div>

        <!-- Step 2: variant picker — shown only when 7c or 6c active -->
        <div class="ft-variants" id="ftVariants" style="display:none">
          <div class="ft-variant-group" id="ftvg7" style="display:none">
            <span class="ft-variant-label">7c variants</span>
            <input type="checkbox" class="ft-check" id="ft7a" data-crop="7" data-label="4-4-3-7">
            <label class="ft-label c7" for="ft7a"><span class="ft-crop">7c</span><span class="ft-dist">4-4-3-7</span></label>
            <input type="checkbox" class="ft-check" id="ft7b" data-crop="7" data-label="3-4-4-7">
            <label class="ft-label c7" for="ft7b"><span class="ft-crop">7c</span><span class="ft-dist">3-4-4-7</span></label>
            <input type="checkbox" class="ft-check" id="ft7c" data-crop="7" data-label="4-3-4-7">
            <label class="ft-label c7" for="ft7c"><span class="ft-crop">7c</span><span class="ft-dist">4-3-4-7</span></label>
            <button class="btn-quick" onclick="selectCropFT(7)">All 7c</button>
          </div>
          <div class="ft-variant-group" id="ftvg6" style="display:none">
            <span class="ft-variant-label">6c variants</span>
            <input type="checkbox" class="ft-check" id="ft6a" data-crop="6" data-label="3-4-5-6">
            <label class="ft-label c6" for="ft6a"><span class="ft-crop">6c</span><span class="ft-dist">3-4-5-6</span></label>
            <input type="checkbox" class="ft-check" id="ft6b" data-crop="6" data-label="4-4-4-6">
            <label class="ft-label c6" for="ft6b"><span class="ft-crop">6c</span><span class="ft-dist">4-4-4-6</span></label>
            <input type="checkbox" class="ft-check" id="ft6c" data-crop="6" data-label="4-5-3-6">
            <label class="ft-label c6" for="ft6c"><span class="ft-crop">6c</span><span class="ft-dist">4-5-3-6</span></label>
            <input type="checkbox" class="ft-check" id="ft6d" data-crop="6" data-label="5-3-4-6">
            <label class="ft-label c6" for="ft6d"><span class="ft-crop">6c</span><span class="ft-dist">5-3-4-6</span></label>
            <input type="checkbox" class="ft-check" id="ft6e" data-crop="6" data-label="3-5-4-6">
            <label class="ft-label c6" for="ft6e"><span class="ft-crop">6c</span><span class="ft-dist">3-5-4-6</span></label>
            <input type="checkbox" class="ft-check" id="ft6f" data-crop="6" data-label="4-3-5-6">
            <label class="ft-label c6" for="ft6f"><span class="ft-crop">6c</span><span class="ft-dist">4-3-5-6</span></label>
            <input type="checkbox" class="ft-check" id="ft6g" data-crop="6" data-label="5-4-3-6">
            <label class="ft-label c6" for="ft6g"><span class="ft-crop">6c</span><span class="ft-dist">5-4-3-6</span></label>
            <button class="btn-quick" onclick="selectCropFT(6)">All 6c</button>
          </div>
        </div>
      </div>
    </div>

    <div class="filter-divider"></div>

    <!-- Row 3: Oasis filter + search -->
    <div class="filter-row">
      <div class="fg">
        <label>Oasis Type (7×7)</label>
        <div class="oasis-checks">
          <input type="checkbox" class="oasis-check" id="oCrop" value="crop">
          <label class="oasis-label" for="oCrop">🌾 Crop</label>
          <input type="checkbox" class="oasis-check" id="oWood" value="wood">
          <label class="oasis-label" for="oWood">🌲 Wood</label>
          <input type="checkbox" class="oasis-check" id="oClay" value="clay">
          <label class="oasis-label" for="oClay">🧱 Clay</label>
          <input type="checkbox" class="oasis-check" id="oIron" value="iron">
          <label class="oasis-label" for="oIron">⛏️ Iron</label>
        </div>
      </div>
      <div class="fg">
        <label>Min Bonus % ≥</label>
        <select id="minBonus">
          <option value="0">Any</option>
          <option value
