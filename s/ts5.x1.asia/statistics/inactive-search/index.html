<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inactive Search — ts5.x1.asia — TravianTools</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:       #0f2153;
      --navy2:      #1a3068;
      --blue:       #1d4ed8;
      --blue2:      #2563eb;
      --blue-light: #3b82f6;
      --blue-glow:  rgba(59,130,246,0.10);
      --cyan:       #0891b2;
      --surface:    #ffffff;
      --surface2:   #f8faff;
      --border:     #e2e8f3;
      --border2:    rgba(37,99,235,0.25);
      --text:       #0f2153;
      --text2:      #3d5a8a;
      --text3:      #7a93bc;
      --green:      #059669;
      --green-bg:   rgba(5,150,105,0.08);
      --amber:      #d97706;
      --amber-bg:   rgba(217,119,6,0.08);
      --red:        #dc2626;
      --red-bg:     rgba(220,38,38,0.08);
      --purple:     #7c3aed;
      --purple-bg:  rgba(124,58,237,0.08);
    }

    body {
      background: #fff;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: radial-gradient(circle, rgba(37,99,235,0.055) 1px, transparent 1px);
      background-size: 32px 32px;
      pointer-events: none; z-index: 0;
    }

    /* ── PAGE WRAP ── */
    .page-wrap {
      position: relative; z-index: 1;
      max-width: 1200px;
      margin: 0 auto;
      padding: 32px 24px 80px;
    }

    /* ── BREADCRUMB ── */
    .breadcrumb {
      display: flex; align-items: center; gap: 6px;
      font-size: 0.8rem; color: var(--text3);
      margin-bottom: 20px; flex-wrap: wrap;
    }
    .breadcrumb a { color: var(--text3); text-decoration: none; transition: color 0.15s; }
    .breadcrumb a:hover { color: var(--blue2); }
    .breadcrumb span.sep { opacity: 0.5; }
    .breadcrumb span.cur { color: var(--text2); font-weight: 500; }

    /* ── PAGE HEADER ── */
    .page-header {
      margin-bottom: 28px;
      animation: fadeDown 0.35s ease both;
    }
    .page-header-inner {
      display: flex; align-items: flex-start;
      justify-content: space-between; gap: 16px;
      flex-wrap: wrap;
    }
    .page-title-group { display: flex; align-items: center; gap: 14px; }
    .page-icon {
      width: 46px; height: 46px; border-radius: 12px;
      background: var(--red-bg);
      border: 1px solid rgba(220,38,38,0.18);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.3rem; flex-shrink: 0;
    }
    .page-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.5rem; font-weight: 700;
      color: var(--navy); letter-spacing: -0.02em;
    }
    .page-subtitle { font-size: 0.875rem; color: var(--text2); margin-top: 3px; line-height: 1.5; }
    .page-badges { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; padding-top: 4px; }
    .page-badge {
      font-size: 0.65rem; font-weight: 700; letter-spacing: 0.06em;
      padding: 3px 10px; border-radius: 100px; border: 1px solid;
    }
    .page-badge.free    { background: var(--green-bg);  color: var(--green);      border-color: rgba(5,150,105,0.2); }
    .page-badge.no-login{ background: var(--blue-glow); color: var(--blue-light); border-color: rgba(59,130,246,0.2); }

    /* ── FILTER PANEL ── */
    .filter-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 24px;
      animation: fadeUp 0.35s ease 0.05s both;
    }

    .filter-section-title {
      font-size: 0.68rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.09em;
      color: var(--text3); margin-bottom: 12px;
    }

    .filter-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 20px;
    }

    .fg { display: flex; flex-direction: column; gap: 5px; }
    .fg label {
      font-size: 0.72rem; font-weight: 600;
      color: var(--text2); letter-spacing: 0.01em;
    }

    .fg select, .fg input[type=number], .fg input[type=text] {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.875rem; color: var(--text);
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 8px; padding: 8px 11px;
      outline: none; transition: border-color 0.18s, box-shadow 0.18s;
      width: 100%;
    }
    .fg select:focus, .fg input:focus {
      border-color: var(--blue2);
      box-shadow: 0 0 0 3px rgba(37,99,235,0.08);
    }

    /* Range inputs */
    .range-wrap { display: flex; align-items: center; gap: 6px; }
    .range-wrap input { flex: 1; min-width: 0; }
    .range-sep { font-size: 0.8rem; color: var(--text3); flex-shrink: 0; }

    /* Toggle chips */
    .chip-group { display: flex; gap: 6px; flex-wrap: wrap; }
    .chip-input { display: none; }
    .chip-label {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 6px 12px;
      border: 1.5px solid var(--border);
      border-radius: 8px; cursor: pointer;
      font-size: 0.8rem; font-weight: 600;
      color: var(--text2);
      background: var(--surface);
      transition: all 0.15s; user-select: none;
    }
    .chip-label:hover { border-color: var(--blue-light); color: var(--navy); }
    .chip-input:checked + .chip-label {
      background: var(--blue-glow);
      border-color: var(--blue2);
      color: var(--blue2);
    }
    /* Tribe chips */
    .chip-input.tribe:checked + .chip-label { background: var(--amber-bg); border-color: var(--amber); color: var(--amber); }

    /* Radio chips */
    .radio-group { display: flex; gap: 6px; }
    .radio-input { display: none; }
    .radio-label {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 7px 14px;
      border: 1.5px solid var(--border);
      border-radius: 8px; cursor: pointer;
      font-size: 0.825rem; font-weight: 600; color: var(--text2);
      background: var(--surface); transition: all 0.15s; user-select: none;
    }
    .radio-input:checked + .radio-label {
      background: var(--blue-glow);
      border-color: var(--blue2);
      color: var(--blue2);
    }

    /* Hide tags input */
    .tags-wrap {
      display: flex; flex-wrap: wrap; gap: 6px;
      border: 1.5px solid var(--border);
      border-radius: 8px; padding: 6px 8px;
      background: var(--surface); cursor: text;
      min-height: 40px; align-items: center;
      transition: border-color 0.18s;
    }
    .tags-wrap:focus-within { border-color: var(--blue2); }
    .tag-pill {
      display: inline-flex; align-items: center; gap: 4px;
      background: var(--navy); color: #fff;
      font-size: 0.72rem; font-weight: 600;
      padding: 2px 8px 2px 10px; border-radius: 100px;
    }
    .tag-remove {
      background: none; border: none; color: rgba(255,255,255,0.7);
      cursor: pointer; font-size: 0.75rem; padding: 0; line-height: 1;
    }
    .tag-remove:hover { color: #fff; }
    .tag-input {
      border: none; outline: none; background: transparent;
      font-family: 'DM Sans', sans-serif; font-size: 0.8rem;
      color: var(--text); flex: 1; min-width: 80px; padding: 2px 4px;
    }

    .filter-divider { height: 1px; background: var(--border); margin: 20px 0; }

    .filter-actions {
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 12px;
    }

    .btn-search {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem; font-weight: 600;
      background: var(--blue2); color: #fff;
      border: none; border-radius: 10px;
      padding: 10px 28px; cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 4px 16px rgba(37,99,235,0.28);
      display: flex; align-items: center; gap: 8px;
    }
    .btn-search:hover { background: var(--blue); transform: translateY(-1px); box-shadow: 0 6px 20px rgba(37,99,235,0.35); }
    .btn-search:active { transform: translateY(0); }
    .btn-search:disabled { opacity: 0.65; cursor: not-allowed; transform: none; }

    .btn-reset {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.825rem; font-weight: 500;
      background: none; color: var(--text3);
      border: 1px solid var(--border); border-radius: 8px;
      padding: 9px 16px; cursor: pointer;
      transition: all 0.15s;
    }
    .btn-reset:hover { color: var(--text2); border-color: var(--border2); background: var(--surface2); }

    /* ── STATS BAR ── */
    .stats-bar {
      display: flex; gap: 24px; flex-wrap: wrap;
      margin-bottom: 16px;
      animation: fadeIn 0.3s ease both;
    }
    .stat-item .stat-label { font-size: 0.72rem; color: var(--text3); margin-bottom: 2px; }
    .stat-item .stat-value {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.1rem; font-weight: 700; color: var(--navy);
    }

    /* ── TABLE ── */
    .table-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      animation: fadeUp 0.4s ease 0.1s both;
    }

    .table-toolbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
      background: var(--surface2);
      flex-wrap: wrap; gap: 10px;
    }
    .table-toolbar-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.875rem; font-weight: 600; color: var(--navy);
    }
    .table-count {
      font-size: 0.75rem; color: var(--text3);
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 100px; padding: 3px 10px;
    }

    .table-scroll { overflow-x: auto; }

    table { width: 100%; border-collapse: collapse; font-size: 0.845rem; }
    thead th {
      padding: 10px 14px;
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
      font-size: 0.68rem; font-weight: 700;
      color: var(--text3); text-transform: uppercase;
      letter-spacing: 0.07em; text-align: left;
      white-space: nowrap; cursor: pointer; user-select: none;
    }
    thead th:hover { color: var(--text2); }
    thead th.sorted { color: var(--blue2); }
    thead th .arr { margin-left: 3px; opacity: 0.5; font-size: 0.7rem; }
    thead th.sorted .arr { opacity: 1; }

    tbody tr { border-bottom: 1px solid var(--border); transition: background 0.12s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: var(--surface2); }
    td { padding: 10px 14px; vertical-align: middle; }

    /* Coord */
    .coord-link {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 600; font-size: 0.875rem;
      color: var(--blue2); text-decoration: none; white-space: nowrap;
    }
    .coord-link:hover { text-decoration: underline; }

    /* Village name */
    .village-link {
      font-weight: 600; color: var(--navy);
      text-decoration: none; font-size: 0.875rem;
    }
    .village-link:hover { color: var(--blue2); text-decoration: underline; }

    /* Player link */
    .player-link {
      font-weight: 600; color: var(--navy);
      text-decoration: none; font-size: 0.825rem;
    }
    .player-link:hover { color: var(--blue2); text-decoration: underline; }

    /* Alliance tag */
    .alliance-tag {
      display: inline-block;
      background: var(--blue-glow); color: var(--blue2);
      font-size: 0.68rem; font-weight: 700;
      padding: 2px 7px; border-radius: 5px;
      text-decoration: none;
    }
    .alliance-tag:hover { background: var(--blue2); color: #fff; }

    /* Tribe icon */
    .tribe-icon { font-size: 1rem; }

    /* Pop cells */
    .pop-cell {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.8rem; font-weight: 600;
      color: var(--navy); text-align: right;
    }
    .pop-cell.same { color: var(--text3); }
    .pop-change {
      font-size: 0.68rem; font-weight: 700;
      padding: 1px 5px; border-radius: 4px;
      margin-left: 3px; white-space: nowrap;
    }
    .pop-change.pos { background: var(--green-bg); color: var(--green); }
    .pop-change.neg { background: var(--red-bg); color: var(--red); }
    .pop-change.zero { display: none; }

    .dist-val {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.8rem; color: var(--text2);
    }

    .no-data { color: var(--text3); font-size: 0.8rem; }

    /* Inactive badge */
    .inactive-days {
      display: inline-flex; align-items: center; gap: 4px;
      background: var(--red-bg); color: var(--red);
      font-size: 0.68rem; font-weight: 700;
      padding: 2px 7px; border-radius: 5px;
      white-space: nowrap;
    }

    /* State box */
    .state-box { padding: 64px 24px; text-align: center; }
    .state-box .si { font-size: 2.4rem; margin-bottom: 12px; }
    .state-box h3 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.05rem; font-weight: 600;
      color: var(--navy); margin-bottom: 6px;
    }
    .state-box p { font-size: 0.875rem; color: var(--text2); line-height: 1.65; max-width: 380px; margin: 0 auto; }

    /* Spinner */
    .spinner {
      display: inline-block; width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,0.35);
      border-top-color: #fff; border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }

    /* Pager */
    .pager {
      display: flex; align-items: center; justify-content: center;
      gap: 5px; padding: 14px;
      border-top: 1px solid var(--border); flex-wrap: wrap;
    }
    .pg-btn {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.78rem; font-weight: 500;
      background: white; border: 1px solid var(--border);
      color: var(--text2); width: 30px; height: 30px;
      border-radius: 6px; cursor: pointer;
      transition: all 0.15s;
      display: inline-flex; align-items: center; justify-content: center;
    }
    .pg-btn:hover:not(:disabled) { background: var(--surface2); border-color: var(--border2); }
    .pg-btn.active { background: var(--blue2); border-color: var(--blue2); color: white; }
    .pg-btn:disabled { opacity: 0.35; cursor: not-allowed; }

    /* Warning banner */
    .data-warning {
      display: flex; align-items: flex-start; gap: 10px;
      background: var(--amber-bg);
      border: 1px solid rgba(217,119,6,0.2);
      border-radius: 10px; padding: 12px 16px;
      font-size: 0.8rem; color: var(--text2);
      line-height: 1.6; margin-bottom: 20px;
    }
    .data-warning .wi { flex-shrink: 0; font-size: 1rem; margin-top: 1px; }

    /* ── ANIMATIONS ── */
    @keyframes fadeDown { from { opacity:0; transform:translateY(-14px); } to { opacity:1; transform:translateY(0); } }
    @keyframes fadeUp   { from { opacity:0; transform:translateY(18px);  } to { opacity:1; transform:translateY(0); } }
    @keyframes fadeIn   { from { opacity:0; } to { opacity:1; } }
    @keyframes spin     { to { transform:rotate(360deg); } }

    @media (max-width: 768px) {
      .page-wrap { padding: 20px 14px 60px; }
      .filter-grid { grid-template-columns: 1fr 1fr; }
      .page-header-inner { flex-direction: column; }
    }
    @media (max-width: 480px) {
      .filter-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <div id="navbar-root"></div>

  <div class="page-wrap">

    <!-- Breadcrumb -->
    <div class="breadcrumb">
      <a href="/">Home</a>
      <span class="sep">›</span>
      <a href="/s/">Servers</a>
      <span class="sep">›</span>
      <a href="/s/ts5.x1.asia/statistics/">ts5.x1.asia</a>
      <span class="sep">›</span>
      <span class="cur">Inactive Search</span>
    </div>

    <!-- Page Header -->
    <div class="page-header">
      <div class="page-header-inner">
        <div class="page-title-group">
          <div class="page-icon">💤</div>
          <div>
            <div class="page-title">Inactive Search</div>
            <div class="page-subtitle">Find players and villages with no population change — potential farm targets.</div>
          </div>
        </div>
        <div class="page-badges">
          <span class="page-badge free">FREE</span>
          <span class="page-badge no-login">No login required</span>
        </div>
      </div>
    </div>

    <!-- Data warning — shown when not enough snapshots -->
    <div class="data-warning" id="dataWarning" style="display:none">
      <span class="wi">⚠️</span>
      <span id="dataWarningText">Not enough snapshots yet. Results shown based on available data.</span>
    </div>

    <!-- Filter Panel -->
    <div class="filter-card">

      <div class="filter-section-title">Search Filters</div>

      <div class="filter-grid">

        <!-- Distance -->
        <div class="fg">
          <label>Distance from (X|Y)</label>
          <div class="range-wrap">
            <input type="number" id="cx" value="0" placeholder="X" style="width:72px;flex:none">
            <span class="range-sep">|</span>
            <input type="number" id="cy" value="0" placeholder="Y" style="width:72px;flex:none">
          </div>
        </div>

        <div class="fg">
          <label>Distance range</label>
          <div class="range-wrap">
            <input type="number" id="distMin" value="0" min="0" placeholder="Min">
            <span class="range-sep">→</span>
            <input type="number" id="distMax" value="400" min="0" placeholder="Max">
          </div>
        </div>

        <!-- Inactive for -->
        <div class="fg">
          <label>Inactive for (days)</label>
          <select id="inactiveDays">
            <option value="2">2 days</option>
            <option value="3">3 days</option>
            <option value="4">4 days</option>
            <option value="5" selected>5 days</option>
            <option value="7">7 days</option>
            <option value="10">10 days</option>
          </select>
        </div>

        <!-- Inactive type -->
        <div class="fg">
          <label>Inactive by</label>
          <div class="radio-group">
            <input type="radio" class="radio-input" name="inactiveType" id="itVillage" value="village" checked>
            <label class="radio-label" for="itVillage">🏘️ Village</label>
            <input type="radio" class="radio-input" name="inactiveType" id="itPlayer" value="player">
            <label class="radio-label" for="itPlayer">👤 Player</label>
          </div>
        </div>

        <!-- Pop Player -->
        <div class="fg">
          <label>Pop Player</label>
          <div class="range-wrap">
            <input type="number" id="popPlayerMin" value="0" min="0" placeholder="Min">
            <span class="range-sep">→</span>
            <input type="number" id="popPlayerMax" value="100000" min="0" placeholder="Max">
          </div>
        </div>

        <!-- Pop Village -->
        <div class="fg">
          <label>Pop Village</label>
          <div class="range-wrap">
            <input type="number" id="popVilMin" value="0" min="0" placeholder="Min">
            <span class="range-sep">→</span>
            <input type="number" id="popVilMax" value="9999" min="0" placeholder="Max">
          </div>
        </div>

      </div>

      <div class="filter-divider"></div>

      <!-- Tribe filter -->
      <div style="margin-bottom:16px">
        <div class="filter-section-title">Hide Tribe</div>
        <div class="chip-group">
          <input type="checkbox" class="chip-input tribe" id="hideRomans" value="1">
          <label class="chip-label" for="hideRomans">🏛️ Romans</label>
          <input type="checkbox" class="chip-input tribe" id="hideTeutons" value="2">
          <label class="chip-label" for="hideTeutons">⚔️ Teutons</label>
          <input type="checkbox" class="chip-input tribe"
