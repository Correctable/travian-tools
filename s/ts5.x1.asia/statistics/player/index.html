<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Player Profile — TravianTools</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* Navbar di-handle oleh navbar.js */
:root {
  --navy:#0f2153;--navy2:#1a3068;--blue:#1d4ed8;--blue2:#2563eb;
  --blue-light:#3b82f6;--blue-glow:rgba(59,130,246,0.10);
  --surface:#ffffff;--surface2:#f8faff;--border:#e2e8f3;
  --border2:rgba(37,99,235,0.25);--text:#0f2153;--text2:#3d5a8a;--text3:#7a93bc;
  --green:#059669;--green-bg:rgba(5,150,105,0.08);
  --amber:#d97706;--amber-bg:rgba(217,119,6,0.08);
  --red:#dc2626;--red-bg:rgba(220,38,38,0.08);
  --purple:#7c3aed;--purple-bg:rgba(124,58,237,0.08);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;color:var(--text);background:var(--surface);min-height:100vh;}
.bg-dot{position:fixed;inset:0;z-index:0;pointer-events:none;background-image:radial-gradient(circle,rgba(37,99,235,0.07) 1px,transparent 1px);background-size:32px 32px;}
.bg-glow{position:fixed;top:-200px;left:50%;transform:translateX(-50%);width:900px;height:600px;z-index:0;pointer-events:none;background:radial-gradient(ellipse at center,rgba(37,99,235,0.06) 0%,transparent 70%);}
.page-wrap{position:relative;z-index:1;max-width:1060px;margin:0 auto;padding:32px 24px 80px;}
.breadcrumb{display:flex;align-items:center;gap:6px;font-size:0.8rem;color:var(--text3);margin-bottom:20px;flex-wrap:wrap;}
.breadcrumb a{color:var(--text3);text-decoration:none;transition:color 0.15s;}
.breadcrumb a:hover{color:var(--blue2);}
.breadcrumb span{color:var(--text2);font-weight:500;}
.profile-header{background:white;border:1px solid var(--border);border-radius:16px;padding:28px 32px;margin-bottom:24px;display:flex;align-items:flex-start;gap:24px;flex-wrap:wrap;}
.profile-avatar{width:64px;height:64px;border-radius:16px;background:var(--blue-glow);border:2px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:1.75rem;flex-shrink:0;}
.profile-info{flex:1;min-width:200px;}
.profile-name{font-family:'Space Grotesk',sans-serif;font-size:1.5rem;font-weight:700;color:var(--navy);letter-spacing:-0.02em;}
.profile-meta{display:flex;align-items:center;gap:8px;margin-top:6px;flex-wrap:wrap;}
.meta-tag{font-size:0.775rem;font-weight:600;padding:3px 9px;border-radius:6px;background:var(--surface2);color:var(--text2);border:1px solid var(--border);text-decoration:none;}
.meta-tag.alliance{background:var(--blue-glow);color:var(--blue2);border-color:var(--border2);}
.meta-tag.tribe{background:var(--amber-bg);color:var(--amber);border-color:transparent;}
.profile-stats{display:flex;gap:32px;flex-wrap:wrap;margin-left:auto;}
.ps-item{text-align:right;}
.ps-item .psl{font-size:0.72rem;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.05em;}
.ps-item .psv{font-family:'Space Grotesk',sans-serif;font-size:1.4rem;font-weight:700;color:var(--navy);}
.psd{font-size:0.75rem;margin-top:1px;}
.psd.up{color:var(--green);}
.psd.dn{color:var(--red);}
.psd.na{color:var(--text3);}
.main-grid{display:grid;grid-template-columns:1fr 320px;gap:24px;align-items:start;}
@media(max-width:860px){.main-grid{grid-template-columns:1fr;}}
.card{background:white;border:1px solid var(--border);border-radius:14px;padding:24px;margin-bottom:20px;}
.card-title{font-family:'Space Grotesk',sans-serif;font-size:0.95rem;font-weight:700;color:var(--navy);margin-bottom:16px;display:flex;align-items:center;gap:8px;}
.card-title .ct-sub{font-size:0.75rem;font-weight:400;color:var(--text3);}
.chart-wrap{position:relative;height:200px;width:100%;}
.chart-tabs{display:flex;gap:4px;margin-bottom:14px;}
.ct-btn{font-family:'DM Sans',sans-serif;font-size:0.775rem;font-weight:500;border:1px solid var(--border);background:transparent;color:var(--text3);padding:4px 10px;border-radius:6px;cursor:pointer;transition:all 0.15s;}
.ct-btn.active{background:var(--blue2);color:white;border-color:var(--blue2);}
.ct-btn:not(.active):hover{background:var(--surface2);color:var(--text2);}
.chart-empty{height:180px;display:flex;align-items:center;justify-content:center;color:var(--text3);font-size:0.875rem;background:var(--surface2);border-radius:10px;}
.data-table{width:100%;border-collapse:collapse;font-size:0.825rem;}
.data-table thead th{background:var(--surface2);padding:8px 12px;font-size:0.7rem;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.05em;text-align:left;border-bottom:1px solid var(--border);}
.data-table thead th.r{text-align:right;}
.data-table tbody tr{border-bottom:1px solid var(--border);transition:background 0.13s;}
.data-table tbody tr:last-child{border-bottom:none;}
.data-table tbody tr:hover{background:var(--surface2);}
.data-table td{padding:8px 12px;vertical-align:middle;}
.data-table td.r{text-align:right;}
.capital-badge{font-size:0.65rem;font-weight:700;color:var(--amber);background:var(--amber-bg);padding:1px 5px;border-radius:4px;margin-left:5px;}
.coords{font-size:0.75rem;color:var(--text3);font-family:'Space Grotesk',sans-serif;}
.pop-val{font-family:'Space Grotesk',sans-serif;font-weight:600;color:var(--navy);}
.ev-badge{display:inline-flex;align-items:center;gap:4px;font-size:0.68rem;font-weight:700;padding:2px 7px;border-radius:100px;white-space:nowrap;}
.ev-conquered{background:var(--red-bg);color:var(--red);}
.ev-destroyed{background:rgba(113,128,150,0.1);color:#4a5568;}
.ev-settled{background:var(--green-bg);color:var(--green);}
.ev-natared{background:var(--purple-bg);color:var(--purple);}
.ev-joined{background:var(--green-bg);color:var(--green);}
.ev-left{background:var(--amber-bg);color:var(--amber);}
.ev-switched{background:var(--blue-glow);color:var(--blue2);}
.ev-deleted{background:rgba(113,128,150,0.1);color:#4a5568;}
.event-row td{font-size:0.8rem;}
.event-date{color:var(--text3);font-size:0.75rem;white-space:nowrap;}
.event-village{font-weight:600;color:var(--navy);}
.event-detail{font-size:0.75rem;color:var(--text3);margin-top:2px;}
.event-detail a{color:var(--blue2);text-decoration:none;}
.event-detail a:hover{text-decoration:underline;}
.sidebar-card{background:white;border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:16px;}
.sc-title{font-size:0.8rem;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:14px;}
.info-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);}
.info-row:last-child{border-bottom:none;}
.ir-label{font-size:0.8rem;color:var(--text2);}
.ir-value{font-size:0.8rem;font-weight:600;color:var(--navy);}
.ir-value a{color:var(--blue2);text-decoration:none;}
.ir-value a:hover{text-decoration:underline;}
.hist-table{width:100%;font-size:0.775rem;border-collapse:collapse;}
.hist-table tr{border-bottom:1px solid var(--border);}
.hist-table tr:last-child{border-bottom:none;}
.hist-table td{padding:6px 4px;color:var(--text2);}
.hist-table td:last-child{text-align:right;font-weight:600;}
.alliance-timeline{display:flex;flex-direction:column;gap:0;}
.at-item{display:flex;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);font-size:0.8rem;}
.at-item:last-child{border-bottom:none;}
.at-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:5px;}
.at-dot.joined{background:var(--green);}
.at-dot.left{background:var(--amber);}
.at-dot.switched{background:var(--blue2);}
.at-dot.deleted{background:#718096;}
.at-body{flex:1;}
.at-date{font-size:0.72rem;color:var(--text3);}
.at-desc{color:var(--navy);font-weight:500;margin-top:1px;}
.at-desc a{color:var(--blue2);text-decoration:none;font-weight:600;}
.at-desc a:hover{text-decoration:underline;}
.empty-state{padding:16px 0;color:var(--text3);font-size:0.825rem;text-align:center;}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid var(--border);border-top-color:var(--blue2);border-radius:50%;animation:spin 0.7s linear infinite;margin-right:6px;vertical-align:middle;}
.not-found{text-align:center;padding:80px 24px;color:var(--text3);}
.not-found h2{font-family:'Space Grotesk',sans-serif;font-size:1.25rem;color:var(--text2);margin-bottom:8px;}
@keyframes fadeDown{from{opacity:0;transform:translateY(-14px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="bg-dot"></div>
<div class="bg-glow"></div>
<div id="navbar-root"></div>
<div class="page-wrap">
  <div class="breadcrumb">
    <a href="/">Home</a><span>›</span>
    <a href="/s/">Servers</a><span>›</span>
    <a href="/s/ts5.x1.asia/statistics/">ts5.x1.asia</a><span>›</span>
    <span id="bcName">Player</span>
  </div>
  <div id="content">
    <div style="text-align:center;padding:80px 0;color:var(--text3);">
      <span class="spinner"></span> Loading player data...
    </div>
  </div>
</div>
<script>
const SERVER      = 'ts5';
const SERVER_SLUG = 'ts5.x1.asia';
const BASE_PATH   = `/s/${SERVER_SLUG}/statistics`;
const API_BASE    = 'https://travian-api.sonybukansoni.workers.dev';
const TRIBE_NAME  = {1:'Roman',2:'Teuton',3:'Gaul',4:'Nature',5:'Natar',6:'Egyptian',7:'Hun'};
const TRIBE_ICON  = {1:'<img src="/images/travian/roman_medium.png" alt="Roman">',2:'<img src="/images/travian/teuton_medium.png" alt="Teuton">',3:'<img src="/images/travian/gaul_medium.png" alt="Gaul">',4:'<img src="/images/travian/nature_medium.png" alt="Nature">',5:'<img src="/images/travian/natar_medium.png" alt="Natar">',6:'<img src="/images/travian/egyptian_medium.png" alt="Egyptian">',7:'<img src="/images/travian/hun_medium.png" alt="Hun">'};
const params   = new URLSearchParams(location.search);
const playerId = params.get('id');
let chartInstance = null, historyData = [];

async function apiGet(endpoint, params={}) {
  const url = new URL(`${API_BASE}/api/${endpoint}`);
  Object.entries(params).forEach(([k,v]) => { if(v !== null && v !== undefined) url.searchParams.set(k, v); });
  const res = await fetch(url.toString());
  if(!res.ok) throw new Error(`HTTP ${res.status}`);
  const json = await res.json();
  if(!json.ok) throw new Error(json.error || 'API error');
  return json;
}

const fmt = n => n!=null ? Number(n).toLocaleString() : '—';
function growthHtml(pop, prev, cls='psd') {
  if(!prev) return `<span class="${cls} na">—</span>`;
  const d = Number(pop)-Number(prev);
  if(d===0) return `<span class="${cls} na">±0</span>`;
  return `<span class="${cls} ${d>0?'up':'dn'}">${d>0?'+':''}${fmt(d)}</span>`;
}
function evBadge(type) {
  const labels={conquered:'⚔️ Conquered',destroyed:'💥 Destroyed',settled:'🏘️ Settled',natared:'🌑 Natared',joined:'➕ Joined',left:'➖ Left',switched:'🔀 Switched',deleted:'🗑️ Deleted'};
  return `<span class="ev-badge ev-${type}">${labels[type]||type}</span>`;
}

async function init() {
  if(!playerId){showNotFound();return;}
  try {
    const data = await apiGet('player', { server: SERVER, id: playerId });

    const p              = data.player;
    const villageRows    = data.villages       || [];
    const histRows       = data.history        || [];
    const villageEvents  = data.villageEvents  || [];
    const allianceEvents = data.allianceEvents || [];
    const villageHistory = data.villageHistory || [];

    if(!p){showNotFound();return;}
    historyData = histRows;

    const prevPopByVillage = {};
    villageHistory.forEach(h => { prevPopByVillage[h.village_id] = Number(h.population); });

    document.title = `${p.player_name} — TravianTools`;
    document.getElementById('bcName').textContent = p.player_name;

    const prev = histRows.length>=2 ? Number(histRows[histRows.length-2].population) : null;
    const growthDay = prev!=null ? Number(p.population)-prev : null;

    const lostVillages   = villageEvents.filter(e=>['conquered','destroyed','natared'].includes(e.event_type)&&String(e.old_player_id)===String(playerId));
    const gainedVillages = villageEvents.filter(e=>e.event_type==='conquered'&&String(e.new_player_id)===String(playerId));

  document.getElementById('content').innerHTML = `
    <div class="profile-header" style="animation:fadeDown 0.4s ease both">
      <div class="profile-avatar">${TRIBE_ICON[p.tribe]||'👤'}</div>
      <div class="profile-info">
        <div class="profile-name">${p.player_name}</div>
        <div class="profile-meta">
          <span class="meta-tag tribe">${TRIBE_NAME[p.tribe]||'Unknown'}</span>
          ${p.alliance_tag
            ?`<a class="meta-tag alliance" href="${BASE_PATH}/statistics/alliance/?id=${p.aid}">[${p.alliance_tag}]</a>`
            :'<span class="meta-tag">No alliance</span>'}
          <a href="/s/${SERVER_SLUG}/map/?player=${encodeURIComponent(p.player_name)}"
          style="display:inline-flex;align-items:center;gap:5px;font-size:0.775rem;font-weight:600;
          padding:3px 10px;border-radius:6px;background:var(--blue-glow);color:var(--blue2);
          border:1px solid var(--border2);text-decoration:none;transition:all 0.18s;"
          onmouseover="this.style.background='var(--blue2)';this.style.color='#fff'"
          onmouseout="this.style.background='var(--blue-glow)';this.style.color='var(--blue2)'">
          🗺️ Show in Map
          </a>
        </div>
      </div>
      <div class="profile-stats">
        <div class="ps-item">
          <div class="psl">Population</div>
          <div class="psv">${fmt(p.population)}</div>
          ${growthHtml(p.population,prev)}
        </div>
        <div class="ps-item">
          <div class="psl">Villages</div>
          <div class="psv">${p.village_count}</div>
          <span class="psd na">active</span>
        </div>
      </div>
    </div>

    <div class="main-grid">
      <div>
        <div class="card" style="animation:fadeUp 0.4s 0.05s ease both">
          <div class="card-title">📈 Population History <span class="ct-sub" id="chartRange"></span></div>
          <div class="chart-tabs">
            <button class="ct-btn active" onclick="renderChart(7,this)">7d</button>
            <button class="ct-btn" onclick="renderChart(14,this)">14d</button>
            <button class="ct-btn" onclick="renderChart(30,this)">30d</button>
            <button class="ct-btn" onclick="renderChart(0,this)">All</button>
          </div>
          <div class="chart-wrap">
            ${histRows.length<2?'<div class="chart-empty">Not enough data yet — check back tomorrow</div>':'<canvas id="popChart"></canvas>'}
          </div>
        </div>

        <div class="card" style="animation:fadeUp 0.4s 0.1s ease both">
          <div class="card-title">🏘️ Villages <span class="ct-sub">${villageRows.length} active</span></div>
          <table class="data-table">
            <thead><tr><th>Village</th><th>Coords</th><th class="r">Population</th><th class="r">+/- (1d)</th></tr></thead>
            <tbody>
              ${villageRows.map(v=>{
                const prevPop = prevPopByVillage[v.village_id];
                const delta   = prevPop!=null ? Number(v.population)-prevPop : null;
                return `<tr>
                  <td>
                    <div style="display:flex;align-items:center;gap:6px">
                      <span style="font-size:1rem;line-height:1">${TRIBE_ICON[v.tribe]||''}</span>
                      <a href="http://${SERVER_SLUG}.travian.com/karte.php?x=${v.x}&y=${v.y}"
                         target="_blank"
                         style="font-weight:600;color:var(--navy);text-decoration:none"
                         onmouseover="this.style.color='var(--blue2)'"
                         onmouseout="this.style.color='var(--navy)'">${v.village_name}</a>
                      ${v.is_capital=='1'||v.is_capital===1?'<span class="capital-badge">CAPITAL</span>':''}
                    </div>
                  </td>
                  <td class="coords">(${v.x}|${v.y})</td>
                  <td class="r pop-val">${fmt(v.population)}</td>
                  <td class="r">
                    ${delta==null
                      ?'<span style="color:var(--text3);font-size:0.75rem">—</span>'
                      :delta===0
                        ?'<span style="color:var(--text3);font-size:0.75rem;font-weight:600">±0</span>'
                        :`<span style="font-size:0.75rem;font-weight:600;color:${delta>0?'var(--green)':'var(--red)'}">${delta>0?'+':''}${fmt(delta)}</span>`}
                  </td>
                </tr>`;
              }).join('')}
            </tbody>
          </table>
        </div>

        ${lostVillages.length?`
        <div class="card" style="animation:fadeUp 0.4s 0.15s ease both">
          <div class="card-title">💀 Lost Villages <span class="ct-sub">${lostVillages.length} total</span></div>
          <table class="data-table">
            <thead><tr><th>Date</th><th>Village</th><th>Type</th><th>Coords</th><th class="r">Pop</th></tr></thead>
            <tbody>
              ${lostVillages.map(e=>`<tr class="event-row">
                <td class="event-date">${e.event_date}</td>
                <td>
                  <div class="event-village">${e.village_name}</div>
                  ${e.new_player_name?`<div class="event-detail">→ <a href="${BASE_PATH}/player/?id=${e.new_player_id}">${e.new_player_name}</a>${e.new_alliance_tag?' ['+e.new_alliance_tag+']':''}</div>`:''}
                </td>
                <td>${evBadge(e.event_type)}</td>
                <td class="coords">(${e.x}|${e.y})</td>
                <td class="r" style="color:var(--text2)">${fmt(e.population)}</td>
              </tr>`).join('')}
            </tbody>
          </table>
        </div>`:''}

        ${gainedVillages.length?`
        <div class="card" style="animation:fadeUp 0.4s 0.2s ease both">
          <div class="card-title">⚔️ Conquered Villages <span class="ct-sub">${gainedVillages.length} total</span></div>
          <table class="data-table">
            <thead><tr><th>Date</th><th>Village</th><th>From</th><th>Coords</th><th class="r">Pop</th></tr></thead>
            <tbody>
              ${gainedVillages.map(e=>`<tr class="event-row">
                <td class="event-date">${e.event_date}</td>
                <td class="event-village">${e.village_name}</td>
                <td>
                  ${e.old_player_name?`<a href="${BASE_PATH}/player/?id=${e.old_player_id}" style="color:var(--blue2);text-decoration:none">${e.old_player_name}</a>${e.old_alliance_tag?' ['+e.old_alliance_tag+']':''}`:'-'}
                </td>
                <td class="coords">(${e.x}|${e.y})</td>
                <td class="r" style="color:var(--text2)">${fmt(e.population)}</td>
              </tr>`).join('')}
            </tbody>
          </table>
        </div>`:''}
      </div>

      <div>
        <div class="sidebar-card" style="animation:fadeUp 0.4s 0.08s ease both">
          <div class="sc-title">Player Info</div>
          <div class="info-row"><span class="ir-label">Server</span><span class="ir-value">${SERVER_SLUG}</span></div>
          <div class="info-row"><span class="ir-label">Tribe</span><span class="ir-value">${TRIBE_NAME[p.tribe]||'—'}</span></div>
          <div class="info-row"><span class="ir-label">Alliance</span><span class="ir-value">
            ${p.alliance_tag?`<a href="${BASE_PATH}/alliance/?id=${p.aid}">[${p.alliance_tag}]</a>`:'—'}
          </span></div>
          <div class="info-row"><span class="ir-label">Villages</span><span class="ir-value">${p.village_count}</span></div>
          <div class="info-row"><span class="ir-label">Population</span><span class="ir-value">${fmt(p.population)}</span></div>
          <div class="info-row"><span class="ir-label">Last updated</span><span class="ir-value">${p.snap_date||'—'}</span></div>
        </div>

        <div class="sidebar-card" style="animation:fadeUp 0.4s 0.12s ease both">
          <div class="sc-title">Daily Growth</div>
          ${histRows.length<2?'<div class="empty-state">Not enough history yet</div>':`
          <table class="hist-table"><tbody>
            ${histRows.slice(-10).reverse().map((h,i,arr)=>{
              const prev2 = arr[i+1];
              const d = prev2 ? Number(h.population)-Number(prev2.population) : null;
              return `<tr>
                <td>${h.snap_date}</td>
                <td style="text-align:right">${fmt(h.population)}</td>
                <td style="text-align:right">${d!=null?`<span style="font-size:0.72rem;font-weight:600;color:${d>0?'var(--green)':d<0?'var(--red)':'var(--text3)'}">${d>0?'+':''}${fmt(d)}</span>`:'—'}</td>
              </tr>`;
            }).join('')}
          </tbody></table>`}
        </div>

        <div class="sidebar-card" style="animation:fadeUp 0.4s 0.16s ease both">
          <div class="sc-title">Alliance History</div>
          ${!allianceEvents.length?'<div class="empty-state">No alliance changes detected yet</div>':`
          <div class="alliance-timeline">
            ${allianceEvents.map(e=>{
              let desc='';
              if(e.event_type==='joined') desc=`Joined <a href="${BASE_PATH}/alliance/?id=${e.new_alliance_id}">[${e.new_alliance_tag}]</a>`;
              else if(e.event_type==='left') desc=`Left <a href="${BASE_PATH}/alliance/?id=${e.old_alliance_id}">[${e.old_alliance_tag}]</a>`;
              else if(e.event_type==='switched') desc=`<a href="${BASE_PATH}/alliance/?id=${e.old_alliance_id}">[${e.old_alliance_tag}]</a> → <a href="${BASE_PATH}/alliance/?id=${e.new_alliance_id}">[${e.new_alliance_tag}]</a>`;
              else if(e.event_type==='deleted') desc='Account deleted';
              return `<div class="at-item">
                <div class="at-dot ${e.event_type}"></div>
                <div class="at-body">
                  <div class="at-date">${e.event_date}</div>
                  <div class="at-desc">${desc}</div>
                </div>
              </div>`;
            }).join('')}
          </div>`}
        </div>
      </div>
    </div>`;

  if(histRows.length>=2){
    loadChartJS().then(()=>renderChart(7,document.querySelector('.ct-btn.active')));
  }
  } catch(e) {
    console.error(e);
    showNotFound();
  }
}

function showNotFound(){
  document.getElementById('content').innerHTML=`
    <div class="not-found"><h2>Player not found</h2>
    <p>This player doesn't exist on ${SERVER_SLUG} or may have been deleted.</p>
    <a href="/s/${SERVER_SLUG}/statistics/" style="color:var(--blue2);margin-top:16px;display:inline-block">← Back to rankings</a></div>`;
}
function loadChartJS(){
  return new Promise(resolve=>{
    if(window.Chart){resolve();return;}
    const s=document.createElement('script');
    s.src='https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js';
    s.onload=resolve;document.head.appendChild(s);
  });
}
function renderChart(days,btn){
  if(btn){document.querySelectorAll('.ct-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');}
  const data = days>0 ? historyData.slice(-days) : historyData;
  document.getElementById('chartRange').textContent=`${data.length} data points`;
  const ctx = document.getElementById('popChart');
  if(!ctx) return;
  if(chartInstance) chartInstance.destroy();
  chartInstance = new Chart(ctx,{
    type:'line',
    data:{labels:data.map(h=>h.snap_date.slice(5)),datasets:[{
      data:data.map(h=>Number(h.population)),
      borderColor:'#2563eb',backgroundColor:'rgba(37,99,235,0.07)',
      borderWidth:2,pointRadius:data.length<=14?4:2,pointBackgroundColor:'#2563eb',tension:0.3,fill:true
    }]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
      scales:{x:{grid:{color:'rgba(226,232,243,0.8)'},ticks:{color:'#7a93bc',font:{size:11}}},
              y:{grid:{color:'rgba(226,232,243,0.8)'},ticks:{color:'#7a93bc',font:{size:11},callback:v=>v.toLocaleString()}}}}
  });
}
init();
</script>
