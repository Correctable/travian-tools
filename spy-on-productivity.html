<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spy on Productivity — Travian Tools</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0c0f;
      --bg2: #0f1218;
      --surface: #13181f;
      --surface2: #1a2130;
      --border: rgba(180, 140, 60, 0.2);
      --border-bright: rgba(180, 140, 60, 0.5);
      --gold: #c9a84c;
      --gold-light: #e8c97a;
      --gold-dim: #7a6030;
      --text: #d4c9b0;
      --text-dim: #7a7060;
      --wood: #6db56d;
      --clay: #c47a3a;
      --iron: #7ab0d4;
      --crop: #d4c04a;
      --red: #c44a4a;
      --green: #4ac47a;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Crimson Pro', Georgia, serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Atmospheric background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 40% at 20% 10%, rgba(180,140,60,0.04) 0%, transparent 60%),
        radial-gradient(ellipse 40% 60% at 80% 80%, rgba(60,80,180,0.04) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    /* Noise texture */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.4;
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 860px;
      margin: 0 auto;
      padding: 48px 24px 80px;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 12px;
      animation: fadeDown 0.6s ease both;
    }

    .header-icon {
      font-size: 2.4rem;
      filter: drop-shadow(0 0 12px rgba(201,168,76,0.4));
    }

    .header h1 {
      font-family: 'Cinzel', serif;
      font-size: clamp(1.4rem, 3vw, 2rem);
      font-weight: 700;
      letter-spacing: 0.08em;
      color: var(--gold-light);
      text-shadow: 0 0 30px rgba(201,168,76,0.3);
    }

    .subtitle {
      font-size: 1rem;
      color: var(--text-dim);
      font-style: italic;
      margin-bottom: 40px;
      padding-left: 4px;
      animation: fadeDown 0.6s 0.1s ease both;
    }

    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 32px;
      animation: fadeIn 0.6s 0.2s ease both;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold-dim), transparent);
    }
    .divider span {
      font-family: 'Cinzel', serif;
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      color: var(--gold-dim);
      text-transform: uppercase;
    }

    /* Report inputs */
    .reports-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 24px;
      animation: fadeUp 0.6s 0.2s ease both;
    }

    @media (max-width: 640px) {
      .reports-grid { grid-template-columns: 1fr; }
    }

    .report-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      overflow: hidden;
      transition: border-color 0.3s;
    }

    .report-card:focus-within {
      border-color: var(--border-bright);
      box-shadow: 0 0 20px rgba(180,140,60,0.08);
    }

    .report-label {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
    }

    .report-label .badge {
      font-family: 'Cinzel', serif;
      font-size: 0.6rem;
      letter-spacing: 0.15em;
      color: var(--gold);
      background: rgba(201,168,76,0.1);
      border: 1px solid var(--border);
      padding: 2px 8px;
      border-radius: 2px;
    }

    .report-label span {
      font-size: 0.8rem;
      color: var(--text-dim);
      font-style: italic;
    }

    textarea {
      width: 100%;
      height: 180px;
      background: transparent;
      border: none;
      outline: none;
      resize: vertical;
      padding: 14px;
      font-family: 'Courier New', monospace;
      font-size: 0.75rem;
      color: var(--text);
      line-height: 1.6;
    }

    textarea::placeholder {
      color: var(--text-dim);
      font-style: italic;
    }

    /* Button */
    .btn-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 40px;
      animation: fadeUp 0.6s 0.3s ease both;
    }

    button {
      font-family: 'Cinzel', serif;
      font-size: 0.8rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--bg);
      background: linear-gradient(135deg, var(--gold) 0%, var(--gold-light) 50%, var(--gold) 100%);
      border: none;
      padding: 14px 48px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: transform 0.2s, box-shadow 0.2s;
      clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
    }

    button::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, transparent 30%, rgba(255,255,255,0.3) 50%, transparent 70%);
      transform: translateX(-100%);
      transition: transform 0.4s;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(201,168,76,0.3);
    }

    button:hover::before {
      transform: translateX(100%);
    }

    button:active { transform: translateY(0); }

    /* Result area */
    #result {
      animation: fadeUp 0.5s ease both;
    }

    .result-panel {
      background: var(--surface);
      border: 1px solid var(--border-bright);
      border-radius: 4px;
      overflow: hidden;
      box-shadow: 0 0 40px rgba(201,168,76,0.06);
    }

    .result-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
    }

    .result-header h2 {
      font-family: 'Cinzel', serif;
      font-size: 0.75rem;
      letter-spacing: 0.2em;
      color: var(--gold);
      text-transform: uppercase;
    }

    .time-badge {
      font-size: 0.8rem;
      color: var(--text-dim);
      font-style: italic;
    }

    .result-body {
      padding: 28px 24px;
    }

    .resources-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 24px;
    }

    @media (max-width: 500px) {
      .resources-grid { grid-template-columns: repeat(2, 1fr); }
    }

    .resource-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 16px 12px;
      text-align: center;
      position: relative;
      overflow: hidden;
      transition: transform 0.2s;
    }

    .resource-card:hover { transform: translateY(-2px); }

    .resource-card::before {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 2px;
    }

    .resource-card.wood::before { background: var(--wood); }
    .resource-card.clay::before { background: var(--clay); }
    .resource-card.iron::before { background: var(--iron); }
    .resource-card.crop::before { background: var(--crop); }

    .resource-icon {
      font-size: 1.6rem;
      margin-bottom: 8px;
      display: block;
    }

    .resource-name {
      font-family: 'Cinzel', serif;
      font-size: 0.55rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .resource-card.wood .resource-name { color: var(--wood); }
    .resource-card.clay .resource-name { color: var(--clay); }
    .resource-card.iron .resource-name { color: var(--iron); }
    .resource-card.crop .resource-name { color: var(--crop); }

    .resource-value {
      font-size: 1.4rem;
      font-weight: 300;
      color: var(--text);
      line-height: 1;
    }

    .resource-unit {
      font-size: 0.65rem;
      color: var(--text-dim);
      margin-top: 4px;
      font-style: italic;
    }

    .total-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 4px;
    }

    .total-label {
      font-family: 'Cinzel', serif;
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      color: var(--text-dim);
      text-transform: uppercase;
    }

    .total-value {
      font-size: 1.1rem;
      color: var(--gold-light);
    }

    /* Error */
    .error-msg {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px 20px;
      background: rgba(196,74,74,0.08);
      border: 1px solid rgba(196,74,74,0.3);
      border-radius: 4px;
      color: #e07070;
      font-style: italic;
      font-size: 0.9rem;
    }

    /* Back link */
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-family: 'Cinzel', serif;
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      color: var(--gold-dim);
      text-decoration: none;
      text-transform: uppercase;
      margin-bottom: 40px;
      transition: color 0.2s;
      animation: fadeIn 0.6s ease both;
    }

    .back-link:hover { color: var(--gold); }

    /* Footer */
    .footer {
      text-align: center;
      margin-top: 60px;
      font-size: 0.75rem;
      color: var(--text-dim);
      font-style: italic;
    }

    /* Animations */
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-16px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes resultIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .result-panel { animation: resultIn 0.4s ease both; }
  </style>
</head>
<body>
  <div class="container">

    <a href="/" class="back-link">← Travian Tools</a>

    <div class="header">
      <span class="header-icon">🕵️</span>
      <h1>Spy on Productivity</h1>
    </div>
    <p class="subtitle">Paste two spy reports from different times to estimate resource production per hour.</p>

    <div class="divider"><span>Intelligence Reports</span></div>

    <div class="reports-grid">
      <div class="report-card">
        <div class="report-label">
          <span class="badge">Report I</span>
          <span>Earlier scan</span>
        </div>
        <textarea id="report1" placeholder="Paste spy report #1 here...&#10;&#10;Must contain:&#10;- Resources line&#10;- Timestamp (DD.MM.YY, HH:MM:SS)"></textarea>
      </div>
      <div class="report-card">
        <div class="report-label">
          <span class="badge">Report II</span>
          <span>Later scan</span>
        </div>
        <textarea id="report2" placeholder="Paste spy report #2 here...&#10;&#10;Must contain:&#10;- Resources line&#10;- Timestamp (DD.MM.YY, HH:MM:SS)"></textarea>
      </div>
    </div>

    <div class="btn-wrap">
      <button onclick="compareReports()">⚔ Analyze Intelligence</button>
    </div>

    <div id="result"></div>

    <div class="footer">correctable.github.io/travian-tools</div>
  </div>

  <script>
    function parsePlainResources(text) {
      const resRegex = /Resources\s+([\d,.]+)\s+([\d,.]+)\s+([\d,.]+)\s+([\d,.]+)/;
      const match = text.match(resRegex);
      if (!match) return null;
      const toNumber = (str) => parseInt(str.replace(/[^\d]/g, ''));
      return {
        wood: toNumber(match[1]),
        clay: toNumber(match[2]),
        iron: toNumber(match[3]),
        crop: toNumber(match[4])
      };
    }

    function extractTimestamp(text) {
      const tsRegex = /(\d{2}\.\d{2}\.\d{2}), (\d{2}:\d{2}:\d{2})/;
      const match = text.match(tsRegex);
      if (!match) return null;
      const [day, month, year] = match[1].split('.').map(Number);
      const [hour, minute, second] = match[2].split(':').map(Number);
      return new Date(2000 + year, month - 1, day, hour, minute, second);
    }

    function formatNum(n) {
      if (n === undefined || n === null) return '—';
      const abs = Math.abs(n);
      const sign = n < 0 ? '-' : '+';
      return (n >= 0 ? '' : sign) + abs.toLocaleString();
    }

    function compareReports() {
      const text1 = document.getElementById('report1').value;
      const text2 = document.getElementById('report2').value;

      const res1 = parsePlainResources(text1);
      const res2 = parsePlainResources(text2);
      const time1 = extractTimestamp(text1);
      const time2 = extractTimestamp(text2);

      const resultEl = document.getElementById('result');

      if (!res1 || !res2 || !time1 || !time2) {
        resultEl.innerHTML = `
          <div class="error-msg">
            ⚠️ Could not parse one or both reports. Make sure each contains a <em>Resources</em> line and a timestamp (DD.MM.YY, HH:MM:SS).
          </div>`;
        return;
      }

      let earlierRes, laterRes, earlierTime, laterTime;
      if (time1 <= time2) {
        earlierTime = time1; laterTime = time2;
        earlierRes = res1; laterRes = res2;
      } else {
        earlierTime = time2; laterTime = time1;
        earlierRes = res2; laterRes = res1;
      }

      const deltaT = (laterTime - earlierTime) / 3600000;
      const delta = {
        wood: Math.round((laterRes.wood - earlierRes.wood) / deltaT),
        clay: Math.round((laterRes.clay - earlierRes.clay) / deltaT),
        iron: Math.round((laterRes.iron - earlierRes.iron) / deltaT),
        crop: Math.round((laterRes.crop - earlierRes.crop) / deltaT),
      };

      const total = delta.wood + delta.clay + delta.iron + delta.crop;
      const hours = Math.floor(deltaT);
      const mins = Math.round((deltaT - hours) * 60);
      const timeStr = hours > 0 ? `${hours}h ${mins}m` : `${mins}m`;

      resultEl.innerHTML = `
        <div class="result-panel">
          <div class="result-header">
            <h2>Production Estimate</h2>
            <span class="time-badge">🕒 ${timeStr} between scans</span>
          </div>
          <div class="result-body">
            <div class="resources-grid">
              <div class="resource-card wood">
                <span class="resource-icon">🌲</span>
                <div class="resource-name">Wood</div>
                <div class="resource-value">${delta.wood.toLocaleString()}</div>
                <div class="resource-unit">per hour</div>
              </div>
              <div class="resource-card clay">
                <span class="resource-icon">🧱</span>
                <div class="resource-name">Clay</div>
                <div class="resource-value">${delta.clay.toLocaleString()}</div>
                <div class="resource-unit">per hour</div>
              </div>
              <div class="resource-card iron">
                <span class="resource-icon">⚙️</span>
                <div class="resource-name">Iron</div>
                <div class="resource-value">${delta.iron.toLocaleString()}</div>
                <div class="resource-unit">per hour</div>
              </div>
              <div class="resource-card crop">
                <span class="resource-icon">🌾</span>
                <div class="resource-name">Crop</div>
                <div class="resource-value">${delta.crop.toLocaleString()}</div>
                <div class="resource-unit">per hour</div>
              </div>
            </div>
            <div class="total-row">
              <span class="total-label">Total Production / Hour</span>
              <span class="total-value">${total.toLocaleString()} res/hr</span>
            </div>
          </div>
        </div>`;
    }
  </script>
</body>
</html>
