<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log In — Travian Tools</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:       #0f2153;
      --navy2:      #1a3068;
      --navy3:      #0b1a3d;
      --blue:       #1d4ed8;
      --blue2:      #2563eb;
      --blue-light: #3b82f6;
      --blue-glow:  rgba(59,130,246,0.10);
      --cyan:       #0891b2;
      --surface:    #ffffff;
      --surface2:   #f8faff;
      --border:     #e2e8f3;
      --border2:    rgba(37,99,235,0.25);
      --text:       #0f2153;
      --text2:      #3d5a8a;
      --text3:      #7a93bc;
      --green:      #059669;
      --green-bg:   rgba(5,150,105,0.08);
      --red:        #dc2626;
      --red-bg:     rgba(220,38,38,0.08);
      --amber:      #d97706;
      --amber-bg:   rgba(217,119,6,0.08);
    }

    body {
      background: #ffffff;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(circle, rgba(37,99,235,0.06) 1px, transparent 1px);
      background-size: 32px 32px;
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      top: -180px;
      left: 50%;
      transform: translateX(-50%);
      width: 900px;
      height: 500px;
      background: radial-gradient(ellipse, rgba(37,99,235,0.07) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .page-wrap {
      position: relative;
      z-index: 1;
      min-height: calc(100vh - 64px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px 24px;
    }

    .auth-container {
      width: 100%;
      max-width: 440px;
      animation: fadeUp 0.4s ease both;
    }

    .auth-card {
      background: #ffffff;
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 40px;
      box-shadow: 0 8px 40px rgba(15,33,83,0.08), 0 2px 8px rgba(37,99,235,0.04);
    }

    .auth-header {
      text-align: center;
      margin-bottom: 32px;
    }

    .auth-icon {
      width: 52px;
      height: 52px;
      background: linear-gradient(135deg, var(--blue2), var(--cyan));
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.4rem;
      margin: 0 auto 18px;
      box-shadow: 0 4px 20px rgba(37,99,235,0.25);
    }

    .auth-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.02em;
      margin-bottom: 6px;
    }

    .auth-subtitle {
      font-size: 0.875rem;
      color: var(--text2);
      line-height: 1.6;
    }

    /* Alert */
    .alert {
      display: none;
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 0.825rem;
      font-weight: 500;
      margin-bottom: 20px;
      border: 1px solid transparent;
      line-height: 1.5;
    }
    .alert-error {
      background: var(--red-bg);
      border-color: rgba(220,38,38,0.2);
      color: var(--red);
    }
    .alert-success {
      background: var(--green-bg);
      border-color: rgba(5,150,105,0.2);
      color: var(--green);
    }

    /* Form */
    .form-group { margin-bottom: 18px; }

    .form-label-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 6px;
    }

    label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text);
      letter-spacing: 0.01em;
    }

    .forgot-link {
      font-size: 0.75rem;
      color: var(--blue2);
      text-decoration: none;
      font-weight: 500;
      transition: color 0.15s;
    }
    .forgot-link:hover { color: var(--blue-light); }

    .input-wrap { position: relative; }

    .input-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 0.95rem;
      pointer-events: none;
      opacity: 0.45;
    }

    input[type="email"],
    input[type="password"] {
      width: 100%;
      height: 46px;
      padding: 0 14px 0 40px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      color: var(--text);
      background: var(--surface2);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      outline: none;
      transition: border-color 0.18s, box-shadow 0.18s, background 0.18s;
    }

    input:focus {
      border-color: var(--blue2);
      background: #ffffff;
      box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
    }

    input.input-error {
      border-color: var(--red);
      box-shadow: 0 0 0 3px rgba(220,38,38,0.08);
    }

    input::placeholder { color: var(--text3); }

    .input-hint {
      font-size: 0.72rem;
      color: var(--text3);
      margin-top: 5px;
      display: block;
    }

    .toggle-pw {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      font-size: 0.85rem;
      color: var(--text3);
      padding: 4px;
      transition: color 0.15s;
    }
    .toggle-pw:hover { color: var(--text2); }

    .form-check {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 24px;
      cursor: pointer;
      font-size: 0.825rem;
      color: var(--text2);
    }

    .form-check input[type="checkbox"] {
      width: 16px;
      height: 16px;
      accent-color: var(--blue2);
      cursor: pointer;
      flex-shrink: 0;
      padding: 0;
      border: none;
      background: none;
      box-shadow: none;
    }

    /* Submit */
    .btn-submit {
      width: 100%;
      height: 48px;
      background: var(--blue2);
      color: #ffffff;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.925rem;
      font-weight: 600;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 4px 20px rgba(37,99,235,0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      letter-spacing: 0.01em;
    }

    .btn-submit:hover:not(:disabled) {
      background: var(--blue-light);
      box-shadow: 0 6px 28px rgba(59,130,246,0.4);
      transform: translateY(-1px);
    }

    .btn-submit:active:not(:disabled) { transform: translateY(0); }
    .btn-submit:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }

    .btn-submit.success {
      background: var(--green) !important;
      box-shadow: 0 4px 20px rgba(5,150,105,0.3) !important;
    }

    /* Spinner */
    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,0.35);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      display: none;
    }
    .btn-submit.loading .spinner { display: block; }
    .btn-submit.loading .btn-label { display: none; }

    @keyframes spin { to { transform: rotate(360deg); } }

    .divider-text {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 24px 0;
      font-size: 0.75rem;
      color: var(--text3);
    }
    .divider-text::before, .divider-text::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .auth-switch {
      text-align: center;
      margin-top: 24px;
      font-size: 0.825rem;
      color: var(--text2);
    }

    .auth-switch a {
      color: var(--blue2);
      font-weight: 600;
      text-decoration: none;
      transition: color 0.15s;
    }
    .auth-switch a:hover { color: var(--blue-light); }

    .auth-perks {
      display: flex;
      justify-content: center;
      gap: 24px;
      margin-top: 28px;
      flex-wrap: wrap;
    }

    .perk {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.75rem;
      color: var(--text3);
    }

    .perk-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--green);
      flex-shrink: 0;
    }

    footer {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 24px;
      border-top: 1px solid var(--border);
      background: var(--surface2);
      font-size: 0.75rem;
      color: var(--text3);
    }

    footer a { color: var(--text3); text-decoration: none; }
    footer a:hover { color: var(--text2); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 480px) {
      .auth-card { padding: 28px 20px; }
      .auth-perks { gap: 14px; }
    }
  </style>
</head>
<body>

  <div id="navbar-root"></div>

  <div class="page-wrap">
    <div class="auth-container">
      <div class="auth-card">

        <div class="auth-header">
          <div class="auth-icon">⚔️</div>
          <h1 class="auth-title">Welcome back</h1>
          <p class="auth-subtitle">Log in to access your tools and saved data.</p>
        </div>

        <div class="alert" id="alertBox"></div>

        <form id="loginForm" novalidate>

          <div class="form-group">
            <label for="email">Email</label>
            <div class="input-wrap">
              <span class="input-icon">🛡️</span>
              <input
                type="email"
                id="email"
                name="email"
                placeholder="your@email.com"
                autocomplete="email"
                required
              >
            </div>
          </div>

          <div class="form-group">
            <div class="form-label-row">
              <label for="password">Password</label>
              <a href="#" class="forgot-link" id="forgotLink">Forgot password?</a>
            </div>
            <div class="input-wrap">
              <span class="input-icon">🔒</span>
              <input
                type="password"
                id="password"
                name="password"
                placeholder="Your password"
                autocomplete="current-password"
                required
              >
              <button type="button" class="toggle-pw" onclick="togglePw('password', this)" aria-label="Toggle password">👁</button>
            </div>
          </div>

          <label class="form-check">
            <input type="checkbox" id="remember" name="remember">
            Keep me logged in
          </label>

          <button type="submit" class="btn-submit" id="submitBtn">
            <div class="spinner"></div>
            <span class="btn-label">Log in →</span>
          </button>

        </form>

        <div class="divider-text">or</div>

        <p style="text-align:center; font-size:0.8rem; color:var(--text3);">
          Don't have an account? <a href="/register/" style="color:var(--blue2);font-weight:600;text-decoration:none;">Sign up free</a>
        </p>

      </div>

      <p class="auth-switch">New to Travian Tools? <a href="/register/">Create a free account</a></p>

      <div class="auth-perks">
        <div class="perk"><div class="perk-dot"></div> Free forever</div>
        <div class="perk"><div class="perk-dot"></div> No ads</div>
        <div class="perk"><div class="perk-dot"></div> All servers</div>
      </div>
    </div>
  </div>

  <footer>
    <a href="/">travian.sonybukansoni.com</a> &nbsp;·&nbsp; Travian Tools
  </footer>

  <!-- Supabase CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="/supabase.js"></script>
  <script src="/servers.js"></script>
  <script src="/navbar.js"></script>

  <script>
    // Kalau sudah login, redirect ke home
    (async () => {
      const session = await window.getSession();
      if (session) window.location.replace('/');
    })();

    // Ambil redirect target dari query param ?next=
    function getRedirectTarget() {
      const params = new URLSearchParams(window.location.search);
      const next = params.get('next');
      // Validasi: hanya path internal (diawali /)
      if (next && next.startsWith('/') && !next.startsWith('//')) return next;
      return '/';
    }

    // Toggle show/hide password
    function togglePw(id, btn) {
      const input = document.getElementById(id);
      const isHidden = input.type === 'password';
      input.type = isHidden ? 'text' : 'password';
      btn.textContent = isHidden ? '🙈' : '👁';
    }

    // Show alert
    function showAlert(msg, type = 'error') {
      const box = document.getElementById('alertBox');
      box.textContent = msg;
      box.className = `alert alert-${type}`;
      box.style.display = 'block';
    }

    function hideAlert() {
      const box = document.getElementById('alertBox');
      box.style.display = 'none';
    }

    // Set button state
    function setLoading(loading) {
      const btn = document.getElementById('submitBtn');
      btn.disabled = loading;
      btn.classList.toggle('loading', loading);
    }

    // Forgot password
    document.getElementById('forgotLink').addEventListener('click', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();

      if (!email) {
        showAlert('Enter your email address first, then click "Forgot password?".');
        return;
      }

      const { error } = await window._supabase.auth.resetPasswordForEmail(email, {
        redirectTo: 'https://travian.sonybukansoni.com/account/reset-password/',
      });

      if (error) {
        showAlert('Failed to send reset email. Please try again.');
      } else {
        showAlert('Password reset link sent! Check your email inbox.', 'success');
      }
    });

    // Login form submit
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      hideAlert();

      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      if (!email || !password) {
        showAlert('Please fill in all fields.');
        return;
      }

      setLoading(true);

      const { data, error } = await window._supabase.auth.signInWithPassword({
        email,
        password,
      });

      setLoading(false);

      if (error) {
        // Pesan error Supabase → terjemahkan ke pesan user-friendly
        let msg = 'Incorrect email or password. Please try again.';
        if (error.message.includes('Email not confirmed')) {
          msg = 'Please confirm your email address before logging in. Check your inbox.';
        } else if (error.message.includes('Invalid login')) {
          msg = 'Incorrect email or password. Please try again.';
        } else if (error.message.includes('rate limit') || error.status === 429) {
          msg = 'Too many login attempts. Please wait a moment before trying again.';
        }
        showAlert(msg);

        document.getElementById('email').classList.add('input-error');
        document.getElementById('password').classList.add('input-error');
        return;
      }

      // Sukses
      const btn = document.getElementById('submitBtn');
      btn.classList.add('success');
      btn.innerHTML = '<span class="btn-label">✓ Logged in!</span>';

      setTimeout(() => {
        window.location.replace(getRedirectTarget());
      }, 700);
    });

    // Hapus error state saat user mulai ketik
    ['email', 'password'].forEach(id => {
      document.getElementById(id).addEventListener('input', () => {
        document.getElementById(id).classList.remove('input-error');
        hideAlert();
      });
    });
  </script>

</body>
</html>
